<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Electron</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http://localhost:8888 ws://localhost:8888;"
    />
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error("GLOBAL ERROR:", msg, "at", url, ":", line, ":", col, error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error("UNHANDLED REJECTION:", event.reason);
      };
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
